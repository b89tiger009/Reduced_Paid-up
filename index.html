<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>減額繳清保險金額估算工具</title>
    <script>
        // 【安全防護】嚴格檢查 HTTP 來源網頁 (Referrer) 驗證機制
        (function() {
            var allowedReferrer = "https://b89tiger009.github.io/Portal_web_encV2/";
            var currentReferrer = document.referrer;
            
            // 如果來源網頁不完全符合允許的網址，則強制中斷載入並直接跳轉回門戶網站
            if (!currentReferrer || currentReferrer.indexOf(allowedReferrer) !== 0) {
                alert("錯誤：未授權的存取來源！本網頁僅允許從指定門戶網站開啟。\\n\\nUnauthorized Access.");
                window.location.href = allowedReferrer;
                throw new Error("Access Denied: Invalid Referrer Source.");
            }
        })();
    </script>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        /* 右上角返回門戶按鈕 */
.btn-portal-back {
    position: fixed;       /* 改為 fixed 可以確保捲動網頁時，按鈕一直固定在右上角 */
    top: 20px;
    right: 20px;
    width: 46px;
    height: 46px;
    background-color: #ffffff;
    border: 2px solid #007a53; /* 國泰綠 */
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0, 122, 83, 0.15);
    transition: all 0.2s ease;
    text-decoration: none;
    z-index: 9999;          /* 確保按鈕層級最高，不會被其他網頁元素遮擋 */
}

/* 漢堡選單的三條橫線 */
.btn-portal-back .bar {
    width: 22px;
    height: 3px;
    background-color: #007a53; /* 國泰綠 */
    border-radius: 2px;
    transition: all 0.2s ease;
}

/* 滑鼠懸停效果 */
.btn-portal-back:hover {
    background-color: #007a53; /* 背景變國泰綠 */
    box-shadow: 0 4px 14px rgba(0, 122, 83, 0.3);
    transform: translateY(-2px); /* 輕微往上浮動 */
}

.btn-portal-back:hover .bar {
    background-color: #fbc02d; /* 線條變國泰黃 */
}
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #1a365d;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #2d3748;
        }
        input {
            width: 100%;

        }
        button {
            width: 100%;
            padding: 12px;

        }

            font-weight: bold;

        }

            color: #4a5568;
            font-size: 15px;
        }
    </style>
</head>
<body>
    
<a href="https://b89tiger009.github.io/Portal_web_encV2/" class="btn-portal-back" title="返回入口網站">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
</a>
    
<div class="container">
    <h2>減額繳清保險金額估算工具</h2>
    
    <div class="form-group">
        <label for="originAmount">1. 原保險金額 (元)</label>
        <input type="number" id="originAmount" placeholder="請輸入原保額" value="12000000">
    </div>

    <div class="form-group">
        <label for="payPeriod">2. 原保單繳費年期 (年)</label>
        <input type="number" id="payPeriod" placeholder="請輸入繳費年期，例如：20" value="20">
    </div>
    
    <div class="form-group">
        <label for="policyYear">3. 保單年度 (年)</label>
        <input type="number" id="policyYear" placeholder="請輸入當前保單年度" value="6">
    </div>

    <div class="form-group">
        <label for="otherFunds">4. 其他調整項 (元)</label>
        <input type="number" id="otherFunds" placeholder="無則填0" value="0">
    </div>
    
    <button onclick="calculateRPU()">開始計算</button>
    
    <div id="resultBox" class="result-box">
        <h3>自動計算結果 (已取至百位數)</h3>
        <div class="result-item">
            <strong>1. 年度末保單價值準備金：</strong>
            <span id="resCSV" class="calc-text"></span> 元
        </div>
        <div class="result-item">
            <strong>2. 年度末解約金：</strong>
            <span id="resSurrender" class="calc-text"></span> 元
        </div>
        <hr style="border: 0; border-top: 1px solid #cbd5e0; margin: 15px 0;">
        <div class="result-item">
            <strong>3. 年度末減額繳清保險金額：</strong><br>
            <span id="resFinalAmount" class="highlight"></span> 元
        </div>
    </div>
</div>

<script>
    // 輔助函式：無條件捨去至百位數 (123456 -> 123400)
    function roundDownToHundreds(num) {
        if (num < 0) return 0;
        return Math.floor(num / 100) * 100;
    }

    function calculateRPU() {
        // 讀取輸入欄位
        const originAmount = parseFloat(document.getElementById('originAmount').value) || 0;
        const payPeriod = parseInt(document.getElementById('payPeriod').value) || 0;
        const policyYear = parseInt(document.getElementById('policyYear').value) || 0;
        const otherFunds = parseFloat(document.getElementById('otherFunds').value) || 0;
        
        // 基本阻擋
        if (originAmount <= 0 || payPeriod <= 0 || policyYear <= 0) {
            alert('請填寫正確的原保額、繳費年期與保單年度！');
            return;
        }

        // 計算各項權重比例倍數
        const amountFactor = originAmount / 12000000;
        const periodFactor = 20 / payPeriod;

        // --- 1. 計算年度末保單價值準備金 ---
        let finalCSV = 0;
        if (policyYear === 1) {
            finalCSV = 0;
        } else {
            const baseCSV = (3482.8 * Math.pow(policyYear, 2)) + (325575 * policyYear) - 318734;
            const rawCSV = baseCSV * amountFactor * periodFactor;
            finalCSV = roundDownToHundreds(rawCSV);
        }

        // --- 2. 計算年度末解約金 (固定與保價金連動) ---
        const rawSurrender = finalCSV * 0.75;
        const finalSurrender = roundDownToHundreds(rawSurrender);

        // --- 3. 計算年度末減額繳清保險金額 ---
        let finalAmount = 0;

        // 特殊規則：若保單年度 = 原保單繳費年期，減額繳清保險金額 = 原保險金額
        if (policyYear === payPeriod) {
            finalAmount = roundDownToHundreds(originAmount);
        } else if (policyYear === 1) {
            finalAmount = 0;
        } else {
            const baseAmount = (-3506.4* Math.pow(policyYear, 2)) + (700840 * policyYear) - 809554;
            const rawFinalAmount = (baseAmount * amountFactor * periodFactor) - otherFunds;
            finalAmount = roundDownToHundreds(rawFinalAmount);
        }

        // 渲染結果至網頁
        document.getElementById('resCSV').innerText = finalCSV.toLocaleString();
        document.getElementById('resSurrender').innerText = finalSurrender.toLocaleString();
        document.getElementById('resFinalAmount').innerText = finalAmount.toLocaleString();

        // 顯示結果區塊
        document.getElementById('resultBox').style.display = 'block';
    }
</script>

</body>
</html>
